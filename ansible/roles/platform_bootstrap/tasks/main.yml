- name: Ensure platform root exists
  file:
    path: /opt/k8s-data-platform
    state: directory
    mode: '0755'

- name: Copy application sources to host
  copy:
    src: "{{ playbook_dir }}/../apps/"
    dest: /opt/k8s-data-platform/apps/
    mode: preserve

- name: Copy infrastructure manifests to host
  copy:
    src: "{{ playbook_dir }}/../infra/"
    dest: /opt/k8s-data-platform/infra/
    mode: preserve

- name: Copy operational scripts to host
  copy:
    src: "{{ playbook_dir }}/../scripts/"
    dest: /opt/k8s-data-platform/scripts/
    mode: preserve

- name: Copy documentation to host
  copy:
    src: "{{ playbook_dir }}/../docs/"
    dest: /opt/k8s-data-platform/docs/
    mode: preserve

- name: Copy root README to host
  copy:
    src: "{{ playbook_dir }}/../README.md"
    dest: /opt/k8s-data-platform/README.md
    mode: '0644'

- name: Preload platform images into Docker and k3s
  command:
    argv:
      - bash
      - /opt/k8s-data-platform/scripts/build_k8s_images.sh
      - --namespace
      - edumgt
      - --tag
      - latest
  args:
    chdir: /opt/k8s-data-platform
    creates: /opt/k8s-data-platform/.image-cache-ready

- name: Mark image cache ready
  file:
    path: /opt/k8s-data-platform/.image-cache-ready
    state: touch
    mode: '0644'

- name: Prepare offline dependency bundle
  command:
    argv:
      - bash
      - /opt/k8s-data-platform/scripts/prepare_offline_bundle.sh
      - --out-dir
      - /opt/k8s-data-platform/offline-bundle
      - --skip-images
  args:
    chdir: /opt/k8s-data-platform
    creates: /opt/k8s-data-platform/offline-bundle/frontend-package-lock.json

- name: Install platform apply helper
  copy:
    dest: /usr/local/bin/platform-apply.sh
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      ENVIRONMENT="${1:-dev}"
      case "${ENVIRONMENT}" in
        dev|prod) ;;
        *)
          printf 'Unsupported environment: %s\n' "${ENVIRONMENT}" >&2
          exit 1
          ;;
      esac
      sudo kubectl apply -k "/opt/k8s-data-platform/infra/k8s/overlays/${ENVIRONMENT}"
      sudo kubectl get pods -n "data-platform-${ENVIRONMENT}"

- name: Install platform reset helper
  copy:
    dest: /usr/local/bin/platform-reset.sh
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      ENVIRONMENT="${1:-dev}"
      case "${ENVIRONMENT}" in
        dev|prod) ;;
        *)
          printf 'Unsupported environment: %s\n' "${ENVIRONMENT}" >&2
          exit 1
          ;;
      esac
      sudo kubectl delete -k "/opt/k8s-data-platform/infra/k8s/runner/overlays/${ENVIRONMENT}" --ignore-not-found
      sudo kubectl delete -k "/opt/k8s-data-platform/infra/k8s/overlays/${ENVIRONMENT}" --ignore-not-found

- name: Install platform status helper
  copy:
    dest: /usr/local/bin/platform-status.sh
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      ENVIRONMENT="${1:-dev}"
      case "${ENVIRONMENT}" in
        dev|prod) ;;
        *)
          printf 'Unsupported environment: %s\n' "${ENVIRONMENT}" >&2
          exit 1
          ;;
      esac
      echo '[kubernetes]'
      sudo kubectl get nodes
      sudo kubectl get pods -n "data-platform-${ENVIRONMENT}"
      sudo kubectl get svc -n "data-platform-${ENVIRONMENT}"
      sudo kubectl get pvc -n "data-platform-${ENVIRONMENT}"

- name: Write host bootstrap note
  copy:
    dest: /opt/k8s-data-platform/README.host.md
    mode: '0644'
    content: |
      # Host Quickstart
      kubectl apply -k /opt/k8s-data-platform/infra/k8s/overlays/dev
      kubectl get pods -n data-platform-dev
      kubectl get svc -n data-platform-dev
      kubectl get pvc -n data-platform-dev
      bash /opt/k8s-data-platform/scripts/publish_dockerhub.sh --namespace edumgt --tag latest
      bash /opt/k8s-data-platform/scripts/prepare_offline_bundle.sh --out-dir /opt/k8s-data-platform/offline-bundle --skip-images
