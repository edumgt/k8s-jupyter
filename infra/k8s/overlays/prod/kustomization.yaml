apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data-platform-prod

resources:
  - ../../base
  - namespace.yaml

labels:
  - pairs:
      app.kubernetes.io/environment: prod

patches:
  - path: platform-configmap-patch.yaml
  - path: platform-secrets-patch.yaml
  - path: backend-patch.yaml
  - path: frontend-patch.yaml
  - path: mongodb-patch.yaml
  - path: jupyter-patch.yaml
  - path: gitlab-patch.yaml
