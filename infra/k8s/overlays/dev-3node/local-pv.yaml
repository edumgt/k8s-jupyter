apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-dev-3node-gitlab-config
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: data-platform-dev
    name: gitlab-config
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker-2
  hostPath:
    path: /var/lib/k8s-data-platform/pv/gitlab-config
    type: DirectoryOrCreate
---
