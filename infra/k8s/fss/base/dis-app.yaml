apiVersion: v1
kind: ConfigMap
metadata:
  name: fss-dis-server-config
  namespace: app
data:
  NODE_ENV: production
  APP_NAME: fss-dis-server-node
  PORT: "3000"
  K8S_APP_NAMESPACE: app
  K8S_USER_NAMESPACE: dis
  LAB_GOVERNANCE_ENABLED: "true"
  JUPYTER_IMAGE: harbor.local/dis/jupter-teradata-fss:latest
  JUPYTER_ACCESS_MODE: dynamic-route
  JUPYTER_DYNAMIC_HOST_SUFFIX: service.jupyter.platform.local
  JUPYTER_DYNAMIC_SCHEME: https
  JUPYTER_DYNAMIC_SUBDOMAIN: jupyter-named-pod
  JUPYTER_WORKSPACE_ROOT: /workspace/user-home
  JUPYTER_BOOTSTRAP_DIR: /opt/platform/bootstrap-workspace
  AUTH_TOKEN_TTL_SECONDS: "28800"
  AUTH_SESSION_PREFIX: "fss:auth:session:"
  CORS_ORIGINS: ""
  FRONTEND_URL: "https://dis.platform.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: fss-dis-server-secret
  namespace: app
type: Opaque
stringData:
  MONGO_URI: mongodb://root:CHANGE_ME@mongo.infra.svc.cluster.local:27017/fss_dis?authSource=admin
  REDIS_URL: redis://root:CHANGE_ME@redis.infra.svc.cluster.local:6379/0
  JUPYTER_TOKEN: CHANGE_ME
  CONTROL_PLANE_USERNAME: admin@test.com
  CONTROL_PLANE_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fss-dis-server
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fss-dis-server-k8s-access
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fss-dis-server-k8s-access
subjects:
  - kind: ServiceAccount
    name: fss-dis-server
    namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fss-dis-server-k8s-access
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fss-dis-server
  namespace: app
  labels:
    app.kubernetes.io/name: fss-dis-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fss-dis-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fss-dis-server
    spec:
      serviceAccountName: fss-dis-server
      containers:
        - name: server
          image: harbor.local/app/fss-dis-server-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: fss-dis-server-config
            - secretRef:
                name: fss-dis-server-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-server
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-server
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-api
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-server
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fss-dis-frontend
  namespace: app
  labels:
    app.kubernetes.io/name: fss-dis-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fss-dis-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fss-dis-frontend
    spec:
      containers:
        - name: frontend
          image: harbor.local/app/fss-dis-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-frontend
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fss-dis
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /livez
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fss-dis-frontend
                port:
                  number: 80
    - host: dis.platform.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /livez
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fss-dis-frontend
                port:
                  number: 80
