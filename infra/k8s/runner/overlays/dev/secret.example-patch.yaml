apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner-config
type: Opaque
stringData:
  config.toml: |
    concurrent = 4
    check_interval = 5

    [[runners]]
      name = "platform-k8s-runner-dev"
      url = "http://gitlab-web:8929/"
      token = "REPLACE_ME"
      executor = "kubernetes"

      [runners.kubernetes]
        namespace = "data-platform-dev"
        image = "alpine:3.20"
        service_account = "gitlab-runner"
        poll_timeout = 600
